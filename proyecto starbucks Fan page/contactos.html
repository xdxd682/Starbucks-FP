<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Starbucks - Contactos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="logo"><img src="https://upload.wikimedia.org/wikipedia/en/d/d3/Starbucks_Corporation_Logo_2011.svg" alt="Logo"></div>
        <nav class="navegacion">
            <a href="index.html">Inicio</a>
            <a href="nosotros.html">Nosotros</a>
            <a href="blog.html">Blog</a>
            <a href="galeria.html">Galería</a>
            <a href="videos.html">Videos</a>
            <a href="promociones.html">Promociones</a>
            <a href="combos.html">Combos</a>
            <a href="contactos.html" class="activo">Contactos</a>
        </nav>
    </header>

    <main class="contenedor">
        <div style="text-align: center; margin-bottom: 30px;">
            <h1>Ponte en <span class="detalle-verde">Contacto</span></h1>
            <p style="color:#666;">¿Tienes alguna consulta o sugerencia? Escríbenos o visítanos.</p>
        </div>
        
        <form class="formulario-contacto" action="#" method="POST" onsubmit="event.preventDefault(); alert('¡Mensaje enviado con éxito!');">
            <div class="grupo-campo">
                <label for="nombre">Nombre Completo:</label>
                <input type="text" id="nombre" required placeholder="Ej. Juan Pérez">
            </div>
            <div class="grupo-campo">
                <label for="correo">Correo Electrónico:</label>
                <input type="email" id="correo" required placeholder="ejemplo@correo.com">
            </div>
            <div class="grupo-campo">
                <label for="mensaje">Mensaje o Sugerencia:</label>
                <textarea id="mensaje" rows="5" required placeholder="Escribe tu mensaje aquí..."></textarea>
            </div>
            <button type="submit" class="btn-ordenar" style="width: 100%; border-radius: 6px;">Enviar Formulario</button>
        </form>

        <section class="seccion-ubicacion" style="text-align: center;">
            <h2>Nuestra <span class="detalle-verde">Ubicación</span></h2>
            <p>📍 Centro de Lima - Tienda Principal (Av. Javier Prado Este / Centro Histórico)</p>
            
            <div class="mapa-contenedor">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3901.666453982947!2d-77.03154862416954!3d-12.066427341490214!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x9105c89599555555%3A0x6bdab7967b0907e5!2sStarbucks!5e0!3m2!1ses-419!2spe!4v1710000000000!5m2!1ses-419!2spe" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
        </section>
    </main>

    <footer class="footer-multimedia"><p>✉️ Nos encanta escucharte y recibir tu visita.</p></footer>
</body>
</html>
